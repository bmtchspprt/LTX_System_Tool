<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silo Sensor Mapper</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4ade80;
    --accent2: #22c55e;
    --text: #e8eaf2;
    --muted: #7b82a0;
    --danger: #f87171;
    --gold: #fbbf24;
    --ltx: #ef4444;
    --lora: #4ade80;
    --wire: #ef4444;
    --font: 'IBM Plex Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    z-index: 100;
  }

  .logo {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--accent);
    white-space: nowrap;
    text-transform: uppercase;
  }
  .logo span { color: var(--muted); font-weight: 400; }

  .addr-row {
    display: flex;
    gap: 6px;
    flex: 1;
    min-width: 220px;
  }

  #addressInput {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 10px;
    font-family: var(--font);
    font-size: 11px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  #addressInput:focus { border-color: var(--accent); }
  #addressInput::placeholder { color: var(--muted); }

  .toolbar-divider {
    width: 1px;
    height: 28px;
    background: var(--border);
    margin: 0 2px;
    flex-shrink: 0;
  }

  button {
    font-family: var(--font);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    padding: 6px 11px;
    border: 1px solid;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-go { background: var(--accent); color: #0f1117; border-color: var(--accent); }
  .btn-go:hover { background: var(--accent2); border-color: var(--accent2); }

  .btn-lock { background: transparent; color: var(--gold); border-color: var(--gold); }
  .btn-lock:hover { background: rgba(251,191,36,0.1); }
  .btn-lock.locked { background: var(--gold); color: #0f1117; }

  .btn-sensor { background: transparent; color: var(--accent); border-color: var(--accent); }
  .btn-sensor:hover { background: rgba(74,222,128,0.08); }

  .btn-ltx { background: transparent; color: var(--ltx); border-color: var(--ltx); }
  .btn-ltx:hover { background: rgba(239,68,68,0.08); }

  .btn-lora { background: transparent; color: var(--lora); border-color: var(--lora); }
  .btn-lora:hover { background: rgba(74,222,128,0.08); }
  .btn-lora.active { background: var(--lora); color: #0f1117; }

  .btn-wire { background: transparent; color: var(--wire); border-color: var(--wire); }
  .btn-wire:hover { background: rgba(239,68,68,0.08); }
  .btn-wire.active { background: var(--wire); color: #fff; }

  .btn-export { background: transparent; color: #a78bfa; border-color: #a78bfa; }
  .btn-export:hover { background: rgba(167,139,250,0.08); }

  .btn-clear { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-clear:hover { background: rgba(248,113,113,0.08); }

  button:disabled { opacity: 0.3; cursor: not-allowed; }

  .status-bar {
    font-size: 10px;
    color: var(--muted);
    padding: 3px 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.05em;
    min-height: 22px;
    display: flex;
    align-items: center;
  }
  .status-bar .locked-msg { color: var(--gold); }
  .status-bar .ok-msg { color: var(--accent); }
  .status-bar .warn-msg { color: #fb923c; }

  .main { flex: 1; display: flex; overflow: hidden; }

  #map-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #c8cdd8;
  }

  .map-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: #888;
    font-size: 13px;
    letter-spacing: 0.06em;
    pointer-events: none;
    background: #d8dce6;
    z-index: 1;
  }
  .map-placeholder .icon { font-size: 44px; opacity: 0.4; }

  #map-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    z-index: 1;
  }

  /* Keep the interactive iframe for panning/zooming reference, hidden during lock */
  #map-iframe-wrap {
    position: absolute;
    inset: 0;
    z-index: 2;
  }
  #map-iframe-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
    filter: brightness(1.4) saturate(0.65);
  }

  /* When locked, iframe is hidden and static image shown */
  #map-container.locked-view #map-iframe-wrap { display: none; }
  #map-container.locked-view #map-img { display: block; }

  #line-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 8;
  }

  #overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  #overlay.interactive { pointer-events: all; }
  #overlay.line-mode { cursor: crosshair; pointer-events: all; }

  /* ── Sensor: solid green circle ── */
  .sensor {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: grab;
    user-select: none;
    pointer-events: all;
  }
  .sensor:active { cursor: grabbing; }

  .sensor-ring {
    border-radius: 50%;
    background: #22c55e;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .sensor.selected .sensor-ring {
    background: var(--gold);
    outline: 3px solid #fff;
    outline-offset: 1px;
  }

  /* ── LTX: solid red square ── */
  .ltx-device {
    position: absolute;
    transform: translate(-50%, -50%);
    cursor: grab;
    user-select: none;
    pointer-events: all;
  }
  .ltx-device:active { cursor: grabbing; }

  .ltx-box {
    background: #ef4444;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ltx-device.selected .ltx-box {
    background: var(--gold);
    outline: 3px solid #fff;
    outline-offset: 1px;
  }

  /* ── Labels ── */
  .device-label {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.93);
    border: 1px solid rgba(0,0,0,0.18);
    color: #111;
    font-family: var(--font);
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 0.04em;
    font-weight: 700;
  }
  .sensor-label-pos { top: calc(50% + var(--r) + 5px); }
  .ltx-label-pos    { top: calc(50% + var(--half) + 5px); }

  .sensor.selected .device-label,
  .ltx-device.selected .device-label {
    border-color: var(--gold);
    color: #92400e;
  }

  /* ── Resize handles ── */
  .resize-handle {
    position: absolute;
    bottom: -4px; right: -4px;
    width: 10px; height: 10px;
    background: #fff;
    border: 2px solid #22c55e;
    border-radius: 50%;
    cursor: se-resize;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .sensor:hover .resize-handle,
  .sensor.selected .resize-handle { opacity: 1; }
  .sensor.selected .resize-handle { border-color: var(--gold); }

  .ltx-resize-handle {
    position: absolute;
    bottom: -4px; right: -4px;
    width: 10px; height: 10px;
    background: #fff;
    border: 2px solid #ef4444;
    border-radius: 50%;
    cursor: se-resize;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .ltx-device:hover .ltx-resize-handle,
  .ltx-device.selected .ltx-resize-handle { opacity: 1; }
  .ltx-device.selected .ltx-resize-handle { border-color: var(--gold); }

  /* ── Sidebar ── */
  #sidebar {
    width: 230px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 10px 12px;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  #device-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  #device-list::-webkit-scrollbar { width: 3px; }
  #device-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .device-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 7px 9px;
    cursor: pointer;
    transition: border-color 0.15s;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .device-item:hover { border-color: var(--muted); }
  .device-item.active { border-color: var(--gold); }
  .device-item.sensor-type { border-left: 3px solid #22c55e; }
  .device-item.ltx-type    { border-left: 3px solid #ef4444; }

  .device-item-top { display: flex; align-items: center; justify-content: space-between; }
  .device-item-id  { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; }

  .device-item-del {
    background: none; border: none; color: var(--danger);
    font-size: 14px; cursor: pointer; padding: 0 2px; line-height: 1;
    opacity: 0.55; transition: opacity 0.15s; letter-spacing: 0;
    text-transform: none; font-weight: 400;
  }
  .device-item-del:hover { opacity: 1; background: none; }

  .device-name-input {
    background: transparent; border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text); font-family: var(--font); font-size: 11px;
    width: 100%; padding: 2px 0; outline: none; transition: border-color 0.15s;
  }
  .device-name-input:focus { border-bottom-color: var(--accent); }

  .device-size-row {
    display: flex; align-items: center; gap: 5px;
    font-size: 9px; color: var(--muted);
  }
  .device-size-row input[type=range] { flex: 1; accent-color: var(--accent); height: 3px; }
  .size-val { min-width: 26px; text-align: right; font-size: 9px; color: var(--muted); }

  .sidebar-footer {
    padding: 10px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sidebar-footer button { width: 100%; }

  .empty-state {
    padding: 20px 12px; text-align: center;
    color: var(--muted); font-size: 10px; line-height: 1.9; letter-spacing: 0.04em;
  }

  .line-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 9px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .line-item-label { font-size: 9px; color: var(--muted); flex: 1; }
  .line-dot { width: 20px; height: 3px; border-radius: 1px; flex-shrink: 0; }
  .line-dot.lora { background: repeating-linear-gradient(90deg,#4ade80 0,#4ade80 5px,transparent 5px,transparent 8px); }
  .line-dot.wire { background: repeating-linear-gradient(90deg,#ef4444 0,#ef4444 4px,transparent 4px,transparent 7px); }

  .list-section {
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--muted); padding: 6px 4px 2px; opacity: 0.7;
  }
</style>
</head>
<body>

<header>
  <div class="logo">Silo<span>Mapper</span></div>

  <div class="addr-row">
    <input id="addressInput" type="text" placeholder="Enter address or farm location..." autocomplete="off" />
    <button class="btn-go" onclick="loadAddress()">Go</button>
  </div>

  <div class="toolbar-divider"></div>
  <button class="btn-lock" id="lockBtn" onclick="toggleLock()" disabled>Lock Map</button>

  <div class="toolbar-divider"></div>
  <button class="btn-sensor" id="addSensorBtn" onclick="addDevice('sensor')" disabled>+ Sensor</button>
  <button class="btn-ltx"    id="addLtxBtn"    onclick="addDevice('ltx')"    disabled>+ LTX</button>

  <div class="toolbar-divider"></div>
  <button class="btn-lora" id="loraBtn" onclick="toggleLineMode('lora')" disabled>LoRa Line</button>
  <button class="btn-wire" id="wireBtn" onclick="toggleLineMode('wire')" disabled>Wire Line</button>

  <div class="toolbar-divider"></div>
  <button class="btn-export" id="exportBtn" onclick="exportPNG()" disabled>Export PNG</button>

  <div class="toolbar-divider"></div>
  <button class="btn-clear" onclick="clearAll()">Clear All</button>
</header>

<div class="status-bar" id="statusBar">
  Enter an address above to load satellite view — then lock the map to place devices.
</div>

<div class="main">
  <div id="map-container">
    <div class="map-placeholder" id="placeholder">
      <div class="icon">🛰️</div>
      <div>No location loaded</div>
      <div style="font-size:10px;margin-top:4px;">Enter an address and click Go</div>
    </div>

    <!-- Static image used for export (crossorigin) -->
    <img id="map-img" crossorigin="anonymous" alt="map" />

    <!-- Live iframe for panning/reference when unlocked -->
    <div id="map-iframe-wrap"></div>

    <svg id="line-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="overlay"></div>
  </div>

  <div id="sidebar">
    <div class="sidebar-header">Devices &amp; Connections</div>
    <div id="device-list">
      <div class="empty-state">
        No devices placed.<br>Lock the map and use<br>+ Sensor or + LTX to begin.
      </div>
    </div>
    <div class="sidebar-footer">
      <button class="btn-sensor" id="sideAddSensor" onclick="addDevice('sensor')" disabled>+ Add Sensor</button>
      <button class="btn-ltx"    id="sideAddLtx"    onclick="addDevice('ltx')"    disabled>+ Add LTX</button>
      <button class="btn-clear"  onclick="clearDevices()">Remove All</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
// ── State ────────────────────────────────────────────────────────────────────
let isLocked = false;
let mapLoaded = false;
let currentAddress = '';
let devices = [];
let lines = [];
let selectedId = null;
let deviceCounter = 0;
let lineCounter = 0;
let dragState = null;
let resizeState = null;
let lineMode = null;
let lineFrom = null;

// ── Element refs ─────────────────────────────────────────────────────────────
const overlay       = document.getElementById('overlay');
const lineSvg       = document.getElementById('line-svg');
const deviceList    = document.getElementById('device-list');
const statusBar     = document.getElementById('statusBar');
const lockBtn       = document.getElementById('lockBtn');
const addSensorBtn  = document.getElementById('addSensorBtn');
const addLtxBtn     = document.getElementById('addLtxBtn');
const loraBtn       = document.getElementById('loraBtn');
const wireBtn       = document.getElementById('wireBtn');
const exportBtn     = document.getElementById('exportBtn');
const sideAddSensor = document.getElementById('sideAddSensor');
const sideAddLtx    = document.getElementById('sideAddLtx');
const mapContainer  = document.getElementById('map-container');
const placeholder   = document.getElementById('placeholder');
const iframeWrap    = document.getElementById('map-iframe-wrap');
const mapImg        = document.getElementById('map-img');

const GMAP_KEY = '';  // ← paste your Google Maps Static API key here for best results
                       //   Without a key it still works via the embed proxy below

// ── Status ───────────────────────────────────────────────────────────────────
function setStatus(msg, type) {
  statusBar.innerHTML = '';
  const span = document.createElement('span');
  span.textContent = msg;
  if (type) span.className = type + '-msg';
  statusBar.appendChild(span);
}

// ── Load address ─────────────────────────────────────────────────────────────
function loadAddress() {
  const addr = document.getElementById('addressInput').value.trim();
  if (!addr) return;
  currentAddress = addr;

  // Show live iframe for browsing
  iframeWrap.innerHTML = '';
  iframeWrap.style.cssText = 'position:absolute;inset:0;z-index:2;';
  const iframe = document.createElement('iframe');
  iframe.id = 'map-iframe';
  iframe.src = `https://maps.google.com/maps?q=${encodeURIComponent(addr)}&t=k&z=18&output=embed&iwloc=near`;
  iframe.setAttribute('allowfullscreen', '');
  iframe.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');
  iframe.style.cssText = 'width:100%;height:100%;border:none;filter:brightness(1.4) saturate(0.65);';
  iframeWrap.appendChild(iframe);

  // Load static map image for export (uses OpenStreetMap tile proxy — no key needed)
  loadStaticMap(addr);

  placeholder.style.display = 'none';
  mapContainer.classList.remove('locked-view');
  mapLoaded = true;
  lockBtn.disabled = false;
  exportBtn.disabled = false;
  setStatus(`Loaded: "${addr}" — Click "Lock Map" to freeze view and place devices.`, 'ok');
  if (isLocked) unlock();
}

document.getElementById('addressInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadAddress();
});

// Build a static satellite image URL we can actually render cross-origin
function loadStaticMap(addr) {
  const rect = mapContainer.getBoundingClientRect();
  const w = Math.round(rect.width)  || 1200;
  const h = Math.round(rect.height) || 800;

  let src;
  if (GMAP_KEY) {
    // Google Maps Static API (best quality, requires API key)
    src = `https://maps.googleapis.com/maps/api/staticmap?center=${encodeURIComponent(addr)}&zoom=18&size=${w}x${h}&maptype=satellite&key=${GMAP_KEY}`;
  } else {
    // Fallback: use a geocoding + tile approach via open APIs
    // We'll geocode with nominatim then build an OSM static image
    geocodeAndLoadTile(addr, w, h);
    return;
  }
  mapImg.src = src;
}

function geocodeAndLoadTile(addr, w, h) {
  // Geocode address using Nominatim
  fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(addr)}&format=json&limit=1`, {
    headers: { 'Accept-Language': 'en' }
  })
  .then(r => r.json())
  .then(data => {
    if (!data || !data[0]) return;
    const lat = parseFloat(data[0].lat);
    const lon = parseFloat(data[0].lon);
    // Use staticmap service (free, no key)
    const src = `https://staticmap.openstreetmap.de/staticmap.php?center=${lat},${lon}&zoom=17&size=${Math.min(w,1024)}x${Math.min(h,1024)}&maptype=satellite`;
    // Try a CORS-friendly tile source
    buildCanvasTileMap(lat, lon, w, h);
  })
  .catch(() => {
    // Silently fail — export will show grey bg
  });
}

// Draw OSM tiles onto an offscreen canvas, then put into mapImg as data URL
function buildCanvasTileMap(lat, lon, containerW, containerH) {
  const zoom = 18;
  const tileSize = 256;

  function latLonToTile(lat, lon, z) {
    const n = Math.pow(2, z);
    const x = Math.floor((lon + 180) / 360 * n);
    const latRad = lat * Math.PI / 180;
    const y = Math.floor((1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n);
    return { x, y };
  }

  const center = latLonToTile(lat, lon, zoom);
  const tilesX = Math.ceil(containerW / tileSize) + 2;
  const tilesY = Math.ceil(containerH / tileSize) + 2;

  const canvas = document.createElement('canvas');
  canvas.width  = containerW;
  canvas.height = containerH;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#c8cdd8';
  ctx.fillRect(0, 0, containerW, containerH);

  const offsetX = Math.floor(tilesX / 2);
  const offsetY = Math.floor(tilesY / 2);
  let loaded = 0;
  const total = tilesX * tilesY;

  for (let dx = -offsetX; dx < tilesX - offsetX; dx++) {
    for (let dy = -offsetY; dy < tilesY - offsetY; dy++) {
      const tx = center.x + dx;
      const ty = center.y + dy;
      const px = (dx + offsetX) * tileSize - (tileSize - containerW % tileSize) / 2;
      const py = (dy + offsetY) * tileSize - (tileSize - containerH % tileSize) / 2;

      const img = new Image();
      img.crossOrigin = 'anonymous';
      // Use ArcGIS satellite tiles (free, supports crossOrigin)
      img.src = `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${zoom}/${ty}/${tx}`;
      img.onload = () => {
        ctx.drawImage(img, px, py, tileSize, tileSize);
        loaded++;
        if (loaded === total) {
          // Apply brightness filter to match iframe appearance
          ctx.globalCompositeOperation = 'source-atop';
          ctx.fillStyle = 'rgba(255,255,255,0.3)';
          ctx.fillRect(0, 0, containerW, containerH);
          ctx.globalCompositeOperation = 'source-over';
          mapImg.src = canvas.toDataURL('image/jpeg', 0.9);
        }
      };
      img.onerror = () => { loaded++; };
    }
  }
}

// ── Lock / Unlock ─────────────────────────────────────────────────────────────
function toggleLock() {
  if (!mapLoaded) return;
  isLocked ? unlock() : lock();
}

function lock() {
  isLocked = true;
  lockBtn.textContent = 'Unlock Map';
  lockBtn.classList.add('locked');
  // Switch to static image view (which html2canvas can capture)
  mapContainer.classList.add('locked-view');
  overlay.classList.add('interactive');
  [addSensorBtn, addLtxBtn, loraBtn, wireBtn, sideAddSensor, sideAddLtx].forEach(b => b.disabled = false);
  setStatus('Map locked — place Sensors and LTX units, then draw connection lines.', 'locked');
}

function unlock() {
  isLocked = false;
  lineMode = null; lineFrom = null;
  loraBtn.classList.remove('active');
  wireBtn.classList.remove('active');
  lockBtn.textContent = 'Lock Map';
  lockBtn.classList.remove('locked');
  mapContainer.classList.remove('locked-view');
  overlay.classList.remove('interactive', 'line-mode');
  [addSensorBtn, addLtxBtn, loraBtn, wireBtn, sideAddSensor, sideAddLtx].forEach(b => b.disabled = true);
  setStatus('Map unlocked — scroll and zoom freely. Lock again to adjust devices.');
}

// ── Add device ────────────────────────────────────────────────────────────────
function addDevice(type) {
  if (!isLocked) return;
  deviceCounter++;
  const rect = overlay.getBoundingClientRect();
  devices.push({
    id: deviceCounter, type,
    name: type === 'sensor' ? `Silo ${deviceCounter}` : `LTX ${deviceCounter}`,
    x: rect.width  / 2 + (Math.random() - 0.5) * 100,
    y: rect.height / 2 + (Math.random() - 0.5) * 100,
    r: type === 'sensor' ? 36 : 28
  });
  renderDevices();
  selectDevice(deviceCounter);
  setStatus(`"${devices[devices.length-1].name}" added — drag to position, resize with corner handle.`, 'ok');
}

// ── Select ────────────────────────────────────────────────────────────────────
function selectDevice(id) {
  if (lineMode) { handleLineClick(id); return; }
  selectedId = id;
  renderDevices();
  renderSidebar();
}

// ── Delete ────────────────────────────────────────────────────────────────────
function deleteDevice(id) {
  devices = devices.filter(d => d.id !== id);
  lines   = lines.filter(l => l.fromId !== id && l.toId !== id);
  if (selectedId === id) selectedId = null;
  renderDevices(); renderLines(); renderSidebar();
}

function deleteLine(id) {
  lines = lines.filter(l => l.id !== id);
  renderLines(); renderSidebar();
}

function clearDevices() {
  devices = []; lines = []; selectedId = null;
  lineMode = null; lineFrom = null;
  loraBtn.classList.remove('active'); wireBtn.classList.remove('active');
  overlay.classList.remove('line-mode');
  renderDevices(); renderLines(); renderSidebar();
}

function clearAll() {
  clearDevices();
  iframeWrap.innerHTML = '';
  mapImg.src = '';
  mapImg.style.display = 'none';
  placeholder.style.display = 'flex';
  mapContainer.classList.remove('locked-view');
  mapLoaded = false; isLocked = false; deviceCounter = 0; lineCounter = 0;
  lockBtn.textContent = 'Lock Map'; lockBtn.classList.remove('locked'); lockBtn.disabled = true;
  exportBtn.disabled = true;
  [addSensorBtn, addLtxBtn, loraBtn, wireBtn, sideAddSensor, sideAddLtx].forEach(b => b.disabled = true);
  overlay.classList.remove('interactive', 'line-mode');
  setStatus('Enter an address above to load satellite view — then lock the map to place devices.');
}

// ── Line mode ─────────────────────────────────────────────────────────────────
function toggleLineMode(type) {
  if (!isLocked) return;
  if (lineMode === type) {
    lineMode = null; lineFrom = null;
    loraBtn.classList.remove('active'); wireBtn.classList.remove('active');
    overlay.classList.remove('line-mode');
    setStatus('Line mode cancelled.', 'ok');
    return;
  }
  lineMode = type; lineFrom = null;
  loraBtn.classList.toggle('active', type === 'lora');
  wireBtn.classList.toggle('active', type === 'wire');
  overlay.classList.add('line-mode');
  setStatus(`${type === 'lora' ? 'LoRa (green dotted)' : 'Wire (red dotted)'} — click start device, then end device.`, 'warn');
}

function handleLineClick(id) {
  if (!lineFrom) {
    lineFrom = id; selectedId = id; renderDevices();
    setStatus(`"${devices.find(d=>d.id===id).name}" selected — click destination device.`, 'warn');
    return;
  }
  if (lineFrom === id) { setStatus('Cannot connect a device to itself.', 'warn'); return; }
  const dup = lines.find(l => (l.fromId===lineFrom&&l.toId===id)||(l.fromId===id&&l.toId===lineFrom));
  if (dup) { setStatus('Line already exists between these two devices.', 'warn'); lineFrom = null; return; }
  lineCounter++;
  const f = devices.find(d=>d.id===lineFrom);
  const t = devices.find(d=>d.id===id);
  lines.push({ id: lineCounter, fromId: lineFrom, toId: id, lineType: lineMode });
  lineFrom = null; selectedId = null;
  renderDevices(); renderLines(); renderSidebar();
  setStatus(`Connected "${f.name}" → "${t.name}" via ${lineMode==='lora'?'LoRa':'Wire'}.`, 'ok');
}

// ── Render lines ──────────────────────────────────────────────────────────────
function renderLines() {
  lineSvg.innerHTML = '';
  lines.forEach(l => {
    const f = devices.find(d=>d.id===l.fromId);
    const t = devices.find(d=>d.id===l.toId);
    if (!f || !t) return;
    const color = l.lineType === 'lora' ? '#4ade80' : '#ef4444';
    const dash  = l.lineType === 'lora' ? '9,6' : '5,4';
    const line  = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', f.x); line.setAttribute('y1', f.y);
    line.setAttribute('x2', t.x); line.setAttribute('y2', t.y);
    line.setAttribute('stroke', color);
    line.setAttribute('stroke-width', l.lineType==='lora' ? 2.5 : 2);
    line.setAttribute('stroke-dasharray', dash);
    line.setAttribute('stroke-linecap', 'round');
    lineSvg.appendChild(line);
  });
}

// ── Render devices ────────────────────────────────────────────────────────────
function renderDevices() {
  overlay.innerHTML = '';
  devices.forEach(d => d.type === 'sensor' ? renderSensor(d) : renderLTX(d));
}

function renderSensor(d) {
  const el = document.createElement('div');
  el.className = 'sensor' + (d.id === selectedId ? ' selected' : '');
  if (lineMode) el.style.cursor = 'crosshair';
  el.dataset.id = d.id;
  el.style.left = d.x + 'px'; el.style.top = d.y + 'px';
  el.style.setProperty('--r', d.r + 'px');

  const ring = document.createElement('div');
  ring.className = 'sensor-ring';
  ring.style.width = ring.style.height = (d.r * 2) + 'px';

  const label = document.createElement('div');
  label.className = 'device-label sensor-label-pos';
  label.textContent = d.name;

  const handle = document.createElement('div');
  handle.className = 'resize-handle';
  handle.dataset.resize = d.id;

  el.appendChild(ring); el.appendChild(label); el.appendChild(handle);
  el.addEventListener('mousedown', startDrag);
  handle.addEventListener('mousedown', startResize);
  el.addEventListener('click', () => { if (!dragState) selectDevice(d.id); });
  overlay.appendChild(el);
}

function renderLTX(d) {
  const el = document.createElement('div');
  el.className = 'ltx-device' + (d.id === selectedId ? ' selected' : '');
  if (lineMode) el.style.cursor = 'crosshair';
  el.dataset.id = d.id;
  el.style.left = d.x + 'px'; el.style.top = d.y + 'px';
  el.style.setProperty('--half', d.r + 'px');

  const box = document.createElement('div');
  box.className = 'ltx-box';
  box.style.width = box.style.height = (d.r * 2) + 'px';

  const label = document.createElement('div');
  label.className = 'device-label ltx-label-pos';
  label.textContent = d.name;

  const handle = document.createElement('div');
  handle.className = 'ltx-resize-handle';
  handle.dataset.resize = d.id;

  el.appendChild(box); el.appendChild(label); el.appendChild(handle);
  el.addEventListener('mousedown', startDrag);
  handle.addEventListener('mousedown', startResize);
  el.addEventListener('click', () => { if (!dragState) selectDevice(d.id); });
  overlay.appendChild(el);
}

// ── Drag & Resize ─────────────────────────────────────────────────────────────
function startDrag(e) {
  if (e.target.dataset.resize) return;
  if (!isLocked) return;
  e.preventDefault();
  const id = parseInt(e.currentTarget.dataset.id);
  if (!lineMode) selectDevice(id);
  const dev = devices.find(d=>d.id===id);
  dragState = { id, startX: e.clientX - dev.x, startY: e.clientY - dev.y };
}

function startResize(e) {
  e.stopPropagation(); e.preventDefault();
  if (!isLocked) return;
  const id = parseInt(e.target.dataset.resize);
  selectDevice(id);
  const dev = devices.find(d=>d.id===id);
  const rect = overlay.getBoundingClientRect();
  resizeState = { id, cx: rect.left + dev.x, cy: rect.top + dev.y };
}

document.addEventListener('mousemove', e => {
  if (dragState) {
    const dev = devices.find(d=>d.id===dragState.id);
    if (!dev) return;
    const rect = overlay.getBoundingClientRect();
    dev.x = Math.max(0, Math.min(rect.width,  e.clientX - dragState.startX));
    dev.y = Math.max(0, Math.min(rect.height, e.clientY - dragState.startY));
    renderDevices(); renderLines();
  }
  if (resizeState) {
    const dev = devices.find(d=>d.id===resizeState.id);
    if (!dev) return;
    const dx = e.clientX - resizeState.cx;
    const dy = e.clientY - resizeState.cy;
    dev.r = Math.max(12, Math.min(160, Math.sqrt(dx*dx+dy*dy)));
    renderDevices();
    const slider = document.querySelector(`.size-slider[data-id="${dev.id}"]`);
    const val    = document.querySelector(`.size-val[data-id="${dev.id}"]`);
    if (slider) slider.value = Math.round(dev.r);
    if (val) val.textContent = Math.round(dev.r) + 'px';
  }
});

document.addEventListener('mouseup', () => { dragState = null; resizeState = null; });

// ── Sidebar ───────────────────────────────────────────────────────────────────
function renderSidebar() {
  deviceList.innerHTML = '';
  if (devices.length === 0 && lines.length === 0) {
    const e = document.createElement('div');
    e.className = 'empty-state';
    e.innerHTML = 'No devices placed.<br>Lock the map and use<br>+ Sensor or + LTX to begin.';
    deviceList.appendChild(e); return;
  }

  if (devices.length > 0) {
    addSectionLabel('Devices');
    devices.forEach(d => {
      const item = document.createElement('div');
      item.className = `device-item ${d.type}-type` + (d.id===selectedId?' active':'');
      item.onclick = () => { if (!lineMode) selectDevice(d.id); };

      const top = document.createElement('div'); top.className = 'device-item-top';
      const idLbl = document.createElement('div'); idLbl.className = 'device-item-id';
      idLbl.textContent = `${d.type.toUpperCase()} #${String(d.id).padStart(2,'0')}`;
      const del = document.createElement('button'); del.className = 'device-item-del'; del.textContent = '×';
      del.onclick = e => { e.stopPropagation(); deleteDevice(d.id); };
      top.appendChild(idLbl); top.appendChild(del);

      const nameIn = document.createElement('input');
      nameIn.type = 'text'; nameIn.className = 'device-name-input'; nameIn.value = d.name;
      nameIn.placeholder = 'Device name...'; nameIn.onclick = e => e.stopPropagation();
      nameIn.oninput = e => { d.name = e.target.value; renderDevices(); };

      const sizeRow = document.createElement('div'); sizeRow.className = 'device-size-row';
      sizeRow.innerHTML = '<span>Size</span>';
      const slider = document.createElement('input');
      slider.type='range'; slider.min=12; slider.max=160; slider.step=1;
      slider.value=Math.round(d.r); slider.className='size-slider'; slider.dataset.id=d.id;
      slider.onclick = e => e.stopPropagation();
      const sizeVal = document.createElement('span');
      sizeVal.className='size-val'; sizeVal.dataset.id=d.id; sizeVal.textContent=Math.round(d.r)+'px';
      slider.oninput = e => { d.r=parseInt(e.target.value); sizeVal.textContent=d.r+'px'; renderDevices(); renderLines(); };
      sizeRow.appendChild(slider); sizeRow.appendChild(sizeVal);

      item.appendChild(top); item.appendChild(nameIn); item.appendChild(sizeRow);
      deviceList.appendChild(item);
    });
  }

  if (lines.length > 0) {
    addSectionLabel('Connections');
    lines.forEach(l => {
      const f = devices.find(d=>d.id===l.fromId);
      const t = devices.find(d=>d.id===l.toId);
      if (!f||!t) return;
      const item = document.createElement('div'); item.className = 'line-item';
      const dot = document.createElement('div'); dot.className = `line-dot ${l.lineType}`;
      const lbl = document.createElement('div'); lbl.className = 'line-item-label';
      lbl.textContent = `${f.name} → ${t.name}`;
      const del = document.createElement('button'); del.className = 'device-item-del'; del.textContent = '×';
      del.onclick = () => deleteLine(l.id);
      item.appendChild(dot); item.appendChild(lbl); item.appendChild(del);
      deviceList.appendChild(item);
    });
  }
}

function addSectionLabel(text) {
  const s = document.createElement('div'); s.className = 'list-section'; s.textContent = text;
  deviceList.appendChild(s);
}

// ── Export PNG ────────────────────────────────────────────────────────────────
function exportPNG() {
  if (!isLocked) {
    setStatus('Lock the map first, then export.', 'warn');
    return;
  }
  setStatus('Generating PNG…', 'ok');

  // Temporarily hide the sidebar UI chrome for a clean export
  const rect   = mapContainer.getBoundingClientRect();
  const canvas = document.createElement('canvas');
  const scale  = 2;
  canvas.width  = rect.width  * scale;
  canvas.height = rect.height * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  // 1. Draw static map image if loaded
  const drawMap = new Promise(resolve => {
    if (mapImg.src && mapImg.complete && mapImg.naturalWidth > 0) {
      ctx.drawImage(mapImg, 0, 0, rect.width, rect.height);
      resolve();
    } else {
      ctx.fillStyle = '#c8d0de';
      ctx.fillRect(0, 0, rect.width, rect.height);
      resolve();
    }
  });

  drawMap.then(() => {
    // 2. Draw SVG lines
    const svgStr = new XMLSerializer().serializeToString(lineSvg);
    const svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    const svgUrl  = URL.createObjectURL(svgBlob);
    const svgImg  = new Image();
    svgImg.onload = () => {
      ctx.drawImage(svgImg, 0, 0, rect.width, rect.height);
      URL.revokeObjectURL(svgUrl);

      // 3. Draw devices (circles and squares)
      devices.forEach(d => {
        if (d.type === 'sensor') {
          ctx.beginPath();
          ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
          ctx.fillStyle = d.id === selectedId ? '#fbbf24' : '#22c55e';
          ctx.fill();
          // Label
          drawLabel(ctx, d.name, d.x, d.y + d.r + 13, d.id === selectedId);
        } else {
          ctx.fillStyle = d.id === selectedId ? '#fbbf24' : '#ef4444';
          ctx.fillRect(d.x - d.r, d.y - d.r, d.r * 2, d.r * 2);
          // Label
          drawLabel(ctx, d.name, d.x, d.y + d.r + 13, d.id === selectedId);
        }
      });

      // 4. Download
      const link = document.createElement('a');
      link.download = 'silo-map.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      setStatus('PNG exported successfully.', 'ok');
    };
    svgImg.onerror = () => {
      // Fallback: export without lines
      URL.revokeObjectURL(svgUrl);
      finishCanvasExport(ctx, rect, canvas);
    };
    svgImg.src = svgUrl;
  });
}

function drawLabel(ctx, text, x, y, selected) {
  ctx.font = 'bold 11px monospace';
  const tw = ctx.measureText(text).width;
  const pad = 5;
  // Background pill
  ctx.fillStyle = selected ? 'rgba(255,251,235,0.95)' : 'rgba(255,255,255,0.93)';
  ctx.strokeStyle = selected ? '#fbbf24' : 'rgba(0,0,0,0.18)';
  ctx.lineWidth = 1;
  roundRect(ctx, x - tw/2 - pad, y - 10, tw + pad*2, 16, 3);
  ctx.fill(); ctx.stroke();
  // Text
  ctx.fillStyle = selected ? '#92400e' : '#111';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y - 2);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.arcTo(x+w, y, x+w, y+r, r);
  ctx.lineTo(x+w, y+h-r); ctx.arcTo(x+w, y+h, x+w-r, y+h, r);
  ctx.lineTo(x+r, y+h); ctx.arcTo(x, y+h, x, y+h-r, r);
  ctx.lineTo(x, y+r); ctx.arcTo(x, y, x+r, y, r);
  ctx.closePath();
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderSidebar();
</script>
